<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sola</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="map"></div>

  <div id="left-column">
    <div id="panel">
      <div class="panel-header">
        <h2>Sola</h2>
      </div>
      <div id="panel-body">
        <div class="field-group">
          <label for="address-input">Søk adresse</label>
          <input type="text" id="address-input" autocomplete="off" placeholder="F.eks. Kirkegata 1, Oslo" />
          <ul id="address-suggestions" class="address-suggestions hidden"></ul>
        </div>

        <button id="geolocate-btn" class="secondary-btn">📍 Bruk min posisjon</button>

        <div class="field-group">
          <label for="datetime-input">Dato og klokkeslett</label>
          <input type="datetime-local" id="datetime-input" />
        </div>

        <div id="sun-readout" class="sun-readout hidden">
          <div><strong>Høyde:</strong> <span id="altitude-value">–</span>°</div>
          <div><strong>Retning:</strong> <span id="azimuth-value">–</span>°</div>
        </div>

        <div id="month-table-container"></div>
      </div>
    </div>
  </div>

  <script src="js/sunpath.js"></script>
  <script src="js/address.js"></script>
  <script src="js/sun-year.js"></script>
  <script src="js/sun-overlay.js"></script>
  <script src="js/app.js"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=%%GOOGLE_MAPS_API_KEY%%&libraries=marker&callback=initMap"
    async defer>
  </script>
<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "3b2830d8c1b74ed68dee031783103adc"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
