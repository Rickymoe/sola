<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sola</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="map"></div>

  <div id="left-column">
    <div id="panel">
      <div class="panel-header">
        <h2>Sola</h2>
      </div>
      <div id="panel-body">
        <div class="field-group">
          <label for="address-input">Søk adresse</label>
          <input type="text" id="address-input" autocomplete="off" placeholder="F.eks. Kirkegata 1, Oslo" />
          <ul id="address-suggestions" class="address-suggestions hidden"></ul>
        </div>

        <div id="month-table-container"></div>
      </div>
    </div>
  </div>

  <button id="geolocate-btn" class="locate-fab" aria-label="Bruk min posisjon" title="Bruk min posisjon">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="3" fill="#4285f4" />
      <path d="M12 2V5M12 19V22M2 12H5M19 12H22" stroke="#4285f4" stroke-width="2" stroke-linecap="round" />
    </svg>
  </button>

  <script src="js/sunpath.js"></script>
  <script src="js/address.js"></script>
  <script src="js/sun-year.js"></script>
  <script src="js/sun-overlay.js"></script>
  <script src="js/app.js"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=%%GOOGLE_MAPS_API_KEY%%&libraries=marker&callback=initMap"
    async defer>
  </script>
<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "3b2830d8c1b74ed68dee031783103adc"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
