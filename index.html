<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sola</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="map"></div>

  <div id="left-column">
    <div id="panel">
      <div class="panel-header">
        <h2>Sola</h2>
        <svg id="sunrise-anim" class="sunrise-anim hidden" viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
          <line x1="4" y1="26" x2="28" y2="26" stroke="#ccc" stroke-width="2" stroke-linecap="round" />
          <g transform="translate(16,26)">
            <circle r="10" fill="#ffd166" opacity="0">
              <animate
                attributeName="opacity"
                to="0.6"
                dur="0.6s"
                begin="sunrise-anim-motion.end"
                fill="freeze"
              />
            </circle>
            <circle r="5" fill="#ffb703" />
            <animateMotion
              id="sunrise-anim-motion"
              path="M 0,0 Q -8,-10 0,-18"
              dur="1.4s"
              begin="indefinite"
              fill="freeze"
              calcMode="spline"
              keyTimes="0;1"
              keySplines="0.4 0 0.2 1"
            />
          </g>
        </svg>
      </div>
      <div id="panel-body">
        <div class="icon-row">
          <button id="geolocate-btn" class="icon-btn" aria-label="Bruk min posisjon" title="Bruk min posisjon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="3" fill="#4285f4" />
              <path d="M12 2V5M12 19V22M2 12H5M19 12H22" stroke="#4285f4" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
          <button id="clear-position-btn" class="icon-btn hidden" aria-label="Fjern valgt punkt" title="Fjern valgt punkt">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 7H20M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13" stroke="#5f6368" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>

        <div id="month-buttons-container" class="month-buttons"></div>
      </div>
    </div>
  </div>

  <script src="js/sunpath.js"></script>
  <script src="js/sun-year.js"></script>
  <script src="js/sun-overlay.js"></script>
  <script src="js/app.js"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=%%GOOGLE_MAPS_API_KEY%%&libraries=marker&callback=initMap"
    async defer>
  </script>
<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "3b2830d8c1b74ed68dee031783103adc"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
